<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Divisas — Tesorería GL</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0c10; --surface: #12151c; --card: #181c26; --border: #2d3343;
            --accent: #4fffb0; --text-main: #e8eaf2; --text-muted: #8b949e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 30px; width: 100%; max-width: 1100px; }
        .header h1 { font-size: 1.4rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .status-bar { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--text-muted); background: var(--surface); padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); display: inline-block; }
        .section-title { width: 100%; max-width: 1100px; font-size: 0.8rem; color: var(--accent); text-transform: uppercase; margin: 25px 0 15px 0; border-bottom: 1px solid var(--border); padding-bottom: 5px; letter-spacing: 2px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; width: 100%; max-width: 1100px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 15px 20px; }
        .card-label { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .card-row { display: flex; justify-content: space-between; align-items: baseline; }
        .card-value { font-family: 'DM Mono', monospace; font-size: 1.6rem; font-weight: 500; color: var(--text-main); }
        .symbol { color: var(--accent); font-size: 0.9rem; margin-right: 2px; }
        .chart-section { width: 100%; max-width: 1100px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-top: 20px; min-height: 400px; }
        #loader { color: var(--accent); font-family: 'DM Mono', monospace; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Sistema de Cotizaciones — Tesorería GL</h1>
        <div class="status-bar">ÚLTIMO REGISTRO: <span id="fecha-val">CARGANDO...</span></div>
    </div>

    <div id="loader">Sincronizando datos actualizados...</div>

    <div id="dashboard" style="display: none; width: 100%; max-width: 1100px;">
        <div class="section-title">Cotizaciones Principales</div>
        <div class="grid-container" id="grid-cards">
            <div class="card"><span class="card-label">USD Oficial (Venta)</span><div class="card-value"><span class="symbol">$</span><span id="usd-venta">0</span></div></div>
            <div class="card"><span class="card-label">USD Billete (BNA)</span><div class="card-value"><span class="symbol">$</span><span id="usd-billete">0</span></div></div>
            <div class="card"><span class="card-label">CCL</span><div class="card-value"><span class="symbol">$</span><span id="ccl-val">0</span></div></div>
            <div class="card"><span class="card-label">MEP</span><div class="card-value"><span class="symbol">$</span><span id="mep-val">0</span></div></div>
        </div>

        <div class="section-title">Evolución tipos de cambio con Banda Superior</div>
        <div class="chart-section"><canvas id="evolutionChart"></canvas></div>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT2bQM7pdAJbxlSojH4kE3kTI-Ck4vOSporH53ECkKjSyYjOZU_cbfuOWOR7NBAKA/pub?gid=1838358506&single=true&output=csv';

        async function init() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                const filas = csvText.split('\n').map(l => l.split(',')).filter(f => f[0] && f[0].includes('-'));

                const actual = filas[filas.length - 1];

                // Función segura para obtener datos aunque falten columnas
                const getVal = (idx) => (actual[idx] && actual[idx].trim() !== "") ? actual[idx] : "0.00";

                document.getElementById('fecha-val').innerText = actual[0];
                document.getElementById('usd-venta').innerText = getVal(2);
                document.getElementById('usd-billete').innerText = getVal(4);
                document.getElementById('ccl-val').innerText = getVal(20);
                document.getElementById('mep-val').innerText = getVal(22);

                renderChart(filas.slice(-90));

                document.getElementById('loader').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } catch (e) {
                document.getElementById('loader').innerText = 'Error: Revisa la publicación del Sheets.';
                console.error(e);
            }
        }

        function renderChart(data) {
            const ctx = document.getElementById('evolutionChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(f => f[0]),
                    datasets: [
                        { label: 'Oficial V.', data: data.map(f => parseFloat(f[2])), borderColor: '#4fffb0', borderWidth: 2, pointRadius: 0, fill: false },
                        { label: 'CCL', data: data.map(f => parseFloat(f[20])), borderColor: '#ff6b6b', borderWidth: 2, pointRadius: 0, fill: false },
                        { label: 'Banda Superior', data: data.map(f => parseFloat(f[26])), borderColor: '#8b949e', borderDash: [5, 5], borderWidth: 1, pointRadius: 0, fill: false },
                        { label: 'Blue', data: data.map(f => parseFloat(f[24])), borderColor: '#00d4ff', borderWidth: 2, pointRadius: 0, fill: false }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { ticks: { color: '#8b949e', maxTicksLimit: 10 } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b949e' } }
                    },
                    plugins: { legend: { labels: { color: '#e8eaf2' } } }
                }
            });
        }
        window.onload = init;
    </script>
</body>
</html>
