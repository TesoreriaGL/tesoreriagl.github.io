<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesorería GL — Monitor de Divisas</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --surface: #12151c;
            --card: #181c26;
            --border: #2d3343;
            --accent: #4fffb0;
            --text-main: #e8eaf2;
            --text-muted: #8b949e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            width: 100%;
            max-width: 1000px;
        }

        .header h1 {
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .status-bar {
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            color: var(--text-muted);
            background: var(--surface);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: inline-block;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .card-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
        }

        .card-value {
            font-family: 'DM Mono', monospace;
            font-size: 2.2rem;
            font-weight: 500;
        }

        .card-value span.symbol {
            font-size: 1.2rem;
            color: var(--accent);
            margin-right: 4px;
        }

        #loader {
            color: var(--accent);
            font-family: 'DM Mono', monospace;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Monitor de Divisas — Tesorería</h1>
        <div class="status-bar">
            ESTADO: <span id="fecha-val">SINCRONIZANDO...</span>
        </div>
    </div>

    <div id="loader">Accediendo a datos de planilla...</div>

    <div class="grid-container" id="dashboard" style="display: none;">
        <div class="card">
            <span class="card-label">USD Oficial (Venta)</span>
            <div class="card-value"><span class="symbol">$</span><span id="usd-val">0.00</span></div>
        </div>
        <div class="card">
            <span class="card-label">Dólar CCL</span>
            <div class="card-value"><span class="symbol">$</span><span id="ccl-val">0.00</span></div>
        </div>
        <div class="card">
            <span class="card-label">Dólar MEP</span>
            <div class="card-value"><span class="symbol">$</span><span id="mep-val">0.00</span></div>
        </div>
        <div class="card">
            <span class="card-label">Oficial A3500</span>
            <div class="card-value"><span class="symbol">$</span><span id="a3500-val">0.00</span></div>
        </div>
    </div>

    <script>
        // PEGA AQUÍ TU URL DE GOOGLE SHEETS (PUBLICA COMO CSV)
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT2bQM7pdAJbxlSojH4kE3kTI-Ck4vOSporH53ECkKjSyYjOZU_cbfuOWOR7NBAKA/pub?gid=1838358506&single=true&output=csv';

        async function init() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                
                // Procesar filas y limpiar vacíos
                const filas = csvText.split('\n')
                                    .map(line => line.split(','))
                                    .filter(f => f[0] && f[0].trim() !== "");

                // Buscamos la última fila que parezca tener una fecha (ej: 2026-04-23)
                // Esto evita errores si hay filas vacías al final de la hoja
                let data = filas[filas.length - 1];
                
                const valores = {
                    fecha: data[0] || 'N/A', 
                    usdVenta: data[2] || '0.00', 
                    ccl: data[20] || '0.00',     
                    mep: data[22] || '0.00',    
                    a3500: data[21] || '0.00'   
                };

                // Inyectar datos en el HTML
                document.getElementById('fecha-val').innerText = valores.fecha.toUpperCase();
                document.getElementById('usd-val').innerText = valores.usdVenta;
                document.getElementById('ccl-val').innerText = valores.ccl;
                document.getElementById('mep-val').innerText = valores.mep;
                document.getElementById('a3500-val').innerText = valores.a3500;

                // Mostrar interfaz
                document.getElementById('loader').style.display = 'none';
                document.getElementById('dashboard').style.display = 'grid';

            } catch (e) {
                document.getElementById('loader').innerText = 'Error de conexión. Verifica la publicación del CSV.';
                console.error(e);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
